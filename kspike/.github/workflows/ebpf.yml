name: ebpf

# Separate workflow because eBPF needs nightly + bpfel target + bpf-linker.
# Marked as advisory: failures don't block the main build matrix.
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'crates/kspike-xdp-burp/bpf/**'
      - 'crates/kspike-ebpf-lsm/bpf/**'
      - '.github/workflows/ebpf.yml'
  workflow_dispatch:

jobs:
  build-bpf:
    name: build eBPF programs
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + BPF target
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: bpfel-unknown-none

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked
        continue-on-error: true

      - name: Install clang + libbpf headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev pkg-config

      - name: build kspike-xdp-burp eBPF
        working-directory: crates/kspike-xdp-burp/bpf
        run: cargo +nightly build --release --target bpfel-unknown-none -Z build-std=core
        continue-on-error: true

      - name: build kspike-ebpf-lsm eBPF
        working-directory: crates/kspike-ebpf-lsm/bpf
        run: cargo +nightly build --release --target bpfel-unknown-none -Z build-std=core
        continue-on-error: true
